AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >
  MarketSentiment daily digest — an EventBridge-scheduled Lambda that runs the
  sentiment pipeline (LLM backend) and emails a brief via SES.

Parameters:
  OpenAIApiKey:
    Type: String
    NoEcho: true
    Description: OpenAI API key for the LLM sentiment + synthesis nodes.
  DigestFrom:
    Type: String
    Description: SES-verified sender address (From).
  DigestTo:
    Type: String
    Description: Recipient address (must also be verified while SES is in sandbox).
  ScheduleExpression:
    Type: String
    Default: "cron(0 9 ? * MON-FRI *)"
    Description: EventBridge Scheduler cron (default 9am weekdays, in the timezone below).
  ScheduleTimezone:
    Type: String
    Default: America/New_York

Resources:
  DigestFunction:
    Type: AWS::Serverless::Function
    Properties:
      PackageType: Image
      MemorySize: 1024
      Timeout: 600            # 10 min — plenty for a few hundred LLM classifications
      Architectures: [x86_64]
      Environment:
        Variables:
          MS_SENTIMENT_BACKEND: llm
          MS_DB_PATH: /tmp/marketsentiment.duckdb   # Lambda fs is read-only except /tmp
          OPENAI_API_KEY: !Ref OpenAIApiKey
          MS_DIGEST_FROM: !Ref DigestFrom
          MS_DIGEST_TO: !Ref DigestTo
      Policies:
        - Statement:
            - Effect: Allow
              Action: [ses:SendEmail, ses:SendRawEmail]
              Resource: "*"
      Events:
        Daily:
          Type: ScheduleV2                          # EventBridge Scheduler
          Properties:
            ScheduleExpression: !Ref ScheduleExpression
            ScheduleExpressionTimezone: !Ref ScheduleTimezone
    Metadata:
      Dockerfile: Dockerfile.lambda
      DockerContext: .
      DockerTag: latest

Outputs:
  FunctionArn:
    Value: !GetAtt DigestFunction.Arn
