AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >
  MarketSentiment daily digest — an EventBridge-scheduled Lambda that runs the
  sentiment pipeline (fine-tuned FinBERT classifier + LLM synthesis) and emails a
  brief via SES.

Parameters:
  OpenAIApiKey:
    Type: String
    NoEcho: true
    Description: OpenAI API key for the LLM synthesis node + low-confidence fallback.
  DigestFrom:
    Type: String
    Description: SES-verified sender address (From).
  DigestTo:
    Type: String
    Description: Recipient address (must also be verified while SES is in sandbox).
  ScheduleExpression:
    Type: String
    Default: "cron(0 9 ? * MON-FRI *)"
    Description: EventBridge Scheduler cron (default 9am weekdays, in the timezone below).
  ScheduleTimezone:
    Type: String
    Default: America/New_York

Resources:
  DigestFunction:
    Type: AWS::Serverless::Function
    Properties:
      PackageType: Image
      MemorySize: 3008          # torch + BERT need headroom; more memory = more CPU too
      Timeout: 600              # 10 min — FinBERT CPU inference + synthesis
      Architectures: [x86_64]
      Environment:
        Variables:
          MS_SENTIMENT_BACKEND: finbert
          MS_FINBERT_MODEL: /opt/model              # the model bundled into the image
          MS_HOT_MIN_MENTIONS: "3"                  # lower threshold -> more tickers shown
          MS_HOT_TOP_N: "20"
          MS_DB_PATH: /tmp/marketsentiment.duckdb   # Lambda fs is read-only except /tmp
          OPENAI_API_KEY: !Ref OpenAIApiKey
          MS_DIGEST_FROM: !Ref DigestFrom
          MS_DIGEST_TO: !Ref DigestTo
      Policies:
        - Statement:
            - Effect: Allow
              Action: [ses:SendEmail, ses:SendRawEmail]
              Resource: "*"
      Events:
        Daily:
          Type: ScheduleV2                          # EventBridge Scheduler
          Properties:
            ScheduleExpression: !Ref ScheduleExpression
            ScheduleExpressionTimezone: !Ref ScheduleTimezone
    Metadata:
      Dockerfile: Dockerfile.lambda.finbert
      DockerContext: .
      DockerTag: latest

Outputs:
  FunctionArn:
    Value: !GetAtt DigestFunction.Arn
